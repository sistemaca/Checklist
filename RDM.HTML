<!DOCTYPE html> 
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>RDM — Relatório Diário de Manutenção Mecânica</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  :root { --paper-w: 794px; --muted: #666; }
  body {
    font-family: "Arial", Helvetica, sans-serif;
    background: #f2f4f7;
    margin: 0;
    padding: 12px;
  }
  .container { max-width: 1200px; margin: 0 auto; }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  }
  h1 { font-size: 18px; margin: 0 0 16px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .col {
    flex: 1; min-width: 140px;
    display: flex; flex-direction: column;
    margin-bottom: 8px;
  }
  label { font-size: 13px; margin-bottom: 4px; color: #222; font-weight: 500; }
  input[type=text], input[type=date], select {
    padding: 10px; border: 1px solid #ddd;
    border-radius: 8px; font-size: 14px;
    background: #fff; width: 100%;
    box-sizing: border-box;
    height: 42px;
  }
  input[type="date"]::-webkit-calendar-picker-indicator {
    padding: 8px;
    cursor: pointer;
  }
  input[readonly] {
    background-color: #f8f9fa;
    cursor: not-allowed;
  }
  .btn {
    display: inline-block; background: #0b73d6; color: #fff;
    border: none; padding: 12px 16px;
    border-radius: 8px; font-size: 14px;
    cursor: pointer; font-weight: 500;
  }
  .btn:hover { background: #0959a8; }
  .btn.gray { background: #6c757d; }
  .btn.warning { background: #ffc107; color: #000; }
  .btn.add-row { background: #28a745; margin-bottom: 16px; }
  
  /* Container da tabela com scroll */
  .table-container {
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin: 12px 0;
    border-radius: 8px;
    border: 1px solid #e0e0e0;
  }
  
  .table {
    width: 100%; 
    border-collapse: collapse; 
    background: #fff;
    min-width: 650px;
  }
  .table th, .table td {
    border: 1px solid #e0e0e0; 
    padding: 10px 8px;
    font-size: 13px; 
    text-align: center;
    vertical-align: middle;
  }
  .table th { 
    background: #f8f9fa; 
    font-weight: 600;
    white-space: nowrap;
  }
  
  /* Estilo simplificado para tipo de manutenção */
  .tipo-wrapper {
    display: flex;
    gap: 5px;
    align-items: center;
    min-width: 180px;
  }
  
  .tipo-select {
    flex: 2;
    min-width: 120px;
    height: 38px;
  }
  
  .tipo-input {
    flex: 1;
    min-width: 80px;
    height: 38px;
    display: none;
  }
  
  .tipo-input.mostrar {
    display: block;
  }
  
  .tipo-select.ocultar {
    display: none;
  }
  
  .actions {
    margin-top: 20px; 
    display: flex; 
    gap: 10px;
    flex-wrap: wrap; 
    align-items: center; 
  }
  .muted { color: var(--muted); font-size: 13px; }
  
  /* PDF styles */
  .rds-paper {
    width: var(--paper-w); padding: 24px; background: #fff;
    color: #111; box-sizing: border-box; font-size: 13px;
  }
  .rds-table {
    width: 100%; border-collapse: collapse; margin-top: 8px;
  }
  .rds-table td, .rds-table th {
    border: 1px solid #333; padding: 6px;
    font-size: 12px; text-align: center;
  }
  
  .remove-row {
    background: #dc3545;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 14px;
    cursor: pointer;
    font-weight: bold;
  }
  
  /* Media query para mobile */
  @media (max-width: 768px) {
    body { padding: 8px; }
    .card { padding: 12px; }
    h1 { font-size: 16px; text-align: center; }
    
    .row { flex-direction: column; gap: 8px; }
    .btn { width: 100%; }
    .actions { flex-direction: column; }
    
    .table-container {
      margin: 8px 0;
      border-radius: 6px;
    }
    
    .table {
      min-width: 550px;
    }
    
    .table th, .table td { 
      font-size: 12px; 
      padding: 8px 2px;
      white-space: nowrap;
    }
    
    /* Ajuste específico para a coluna do horímetro */
    .table td:nth-child(4) input {
      max-width: 70px;
      padding: 6px 4px;
      font-size: 11px;
    }
    
    /* Ajuste para a coluna de data */
    .table td:nth-child(3) input {
      max-width: 110px;
    }
    
    /* Ajuste para o select de equipamento */
    .table td:first-child select {
      max-width: 100px;
      font-size: 11px;
      padding: 6px 4px;
    }
    
    .tipo-wrapper {
      min-width: 140px;
      gap: 3px;
    }
    
    .tipo-select, .tipo-input {
      font-size: 11px;
      padding: 6px 4px;
      height: 32px;
      min-width: 70px;
    }
    
    .remove-row {
      padding: 4px 8px;
      font-size: 11px;
    }
  }
</style>
</head>

<body>
<div class="container">
  <div class="card">
    <h1>RDM — Relatório de Manutenção Mecânica</h1>

    <div class="row">
      <div class="col"><label>Data do Documento</label><input id="rdm_data" type="date" readonly></div>
      <div class="col"><label>Hora do Documento</label><input id="rdm_hora_doc" type="text" readonly></div>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin: 16px 0 8px;">
      <div class="muted">Registros de Manutenção</div>
      <button id="btnAdicionarLinha" class="btn add-row">+ Adicionar Linha</button>
    </div>
    
    <div class="table-container">
      <table class="table" id="tblEquipamentos">
        <thead>
          <tr>
            <th>EQUIPAMENTO</th>
            <th>TIPO DE MANUTENÇÃO</th>
            <th>DATA</th>
            <th>HORÍMETRO</th>
            <th></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="actions">
      <button id="btnServidor" class="btn">Enviar para o Servidor</button>
      <button id="btnGerarPDF" class="btn">Gerar PDF</button>
      <button id="btnLimpar" class="btn gray">Limpar</button>
      <button id="btnRecarregarTipos" class="btn warning">Recarregar Tipos</button>
      <button id="btnSalvarLocal" class="btn">Salvar Localmente</button>
    </div>

  </div>
</div>

<div id="paper" style="visibility:hidden; position:absolute; left:-9999px; top:0">
  <div class="rds-paper" id="rdm_report">
    <div style="display:flex;justify-content:space-between;">
      <div>
        <div style="font-size:12px">COMERCIAL ARCOS LTDA</div>
        <div style="font-size:11px;margin-top:4px">ROD BR 354, KM 474, Nº 749 - VILA CALCITA - ARCOS/MG</div>
      </div>
      <div style="text-align:right">
        <div style="font-weight:700">RELATÓRIO DE MANUTENÇÃO MECÂNICA (RDM)</div>
        <div id="meta_data"></div>
        <div id="meta_hora_doc"></div>
      </div>
    </div>

    <table class="rds-table" id="rdm_table_equip" style="margin-top:12px">
      <thead>
        <tr>
          <th>EQUIPAMENTO</th>
          <th>TIPO DE MANUTENÇÃO</th>
          <th>DATA</th>
          <th>HORÍMETRO</th>
        </tr>
      </thead>
      <tbody id="rdm_equip_rows"></tbody>
    </table>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

// Configurações da API
const BIN_MANUTENCAO = '69aac5b043b1c97be9b9b4ee';
const BIN_RELATORIO = '69ab07aa43b1c97be9ba9d4c';
const MASTER_KEY = '$2a$10$xR7zwFrjQCoS2LoogAgVfOhRVOufQ4AVodOT8T/m./XkGbS1UICxi';
const API_MANUTENCAO = `https://api.jsonbin.io/v3/b/${BIN_MANUTENCAO}/latest`;

// Lista de equipamentos
const equipamentos = [
  "EMP005","EMP006","EMP007","EMP008","EMP010","EMP011","EMP012","EMP013","EMP014","EMP015",
  "EMP016","EMP017","EMP018","EMP019","EMP020","EMP021","EMP022","EMP023","EMP024","EMP025",
  "MC002","MC004","MC005","MC006",
  "PC001","PC002","PC004","PC005","PC006","PC007","PC008","PC009","PC010"
];

let tiposManutencao = {};
let tiposCarregados = false;

// Função para criar select de equipamentos
function criarSelectEquipamento() {
  const select = document.createElement('select');
  select.style.width = '100%';
  
  const optionVazia = document.createElement('option');
  optionVazia.value = '';
  optionVazia.textContent = '-- Selecione --';
  select.appendChild(optionVazia);
  
  equipamentos.forEach(equip => {
    const option = document.createElement('option');
    option.value = equip;
    option.textContent = equip;
    select.appendChild(option);
  });
  
  return select;
}

// Função simplificada para criar o campo de tipo
function criarTipoManutencao() {
  const wrapper = document.createElement('div');
  wrapper.className = 'tipo-wrapper';
  
  const select = document.createElement('select');
  select.className = 'tipo-select';
  
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'tipo-input';
  input.placeholder = 'Digite...';
  
  // Opções
  const optionVazia = document.createElement('option');
  optionVazia.value = '';
  optionVazia.textContent = '-- Selecione --';
  select.appendChild(optionVazia);
  
  const optionOutros = document.createElement('option');
  optionOutros.value = 'OUTROS';
  optionOutros.textContent = 'OUTROS (digitar)';
  select.appendChild(optionOutros);
  
  // Evento: quando selecionar OUTROS, mostra o input
  select.addEventListener('change', () => {
    if (select.value === 'OUTROS') {
      select.classList.add('ocultar');
      input.classList.add('mostrar');
      input.focus();
    }
  });
  
  // Evento: quando input perde foco e está vazio, volta ao select
  input.addEventListener('blur', () => {
    if (!input.value.trim()) {
      input.classList.remove('mostrar');
      select.classList.remove('ocultar');
      select.value = '';
    }
  });
  
  // Enter no input confirma e mantém
  input.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      if (input.value.trim()) {
        // Mantém como está
      }
    }
  });
  
  wrapper.appendChild(select);
  wrapper.appendChild(input);
  
  return { wrapper, select, input };
}

// Função para carregar tipos
async function carregarTiposManutencao(mostrarAlerta = false) {
  try {
    const response = await fetch(API_MANUTENCAO, {
      headers: { 'X-Master-Key': MASTER_KEY }
    });
    
    if (response.ok) {
      const data = await response.json();
      tiposManutencao = data.record.descricao || {};
      tiposCarregados = true;
      atualizarTodosOsSelects();
      if (mostrarAlerta) alert('✅ Tipos recarregados!');
    } else {
      tiposManutencao = {
        "PREVENTIVA": 28,
        "CORRETIVA": 1,
        "TROCA DE ÓLEO": 7,
        "REVISÃO GERAL": 6,
        "TROCA DE FILTROS": 49,
        "LUBRIFICAÇÃO": 15
      };
      atualizarTodosOsSelects();
      if (mostrarAlerta) alert('⚠️ Usando lista padrão.');
    }
  } catch (error) {
    console.error('Erro:', error);
  }
}

// Atualizar selects
function atualizarTodosOsSelects() {
  const rows = tblBody.querySelectorAll('tr');
  rows.forEach(row => {
    const select = row.querySelector('.tipo-select');
    if (!select) return;
    
    const valorAtual = select.value;
    
    // Limpar opções (mantém as duas primeiras)
    while (select.options.length > 2) {
      select.remove(2);
    }
    
    // Adicionar novas opções
    if (tiposManutencao && typeof tiposManutencao === 'object') {
      Object.keys(tiposManutencao)
        .filter(key => key !== '0' && key !== '151')
        .sort()
        .forEach(descricao => {
          const option = document.createElement('option');
          option.value = descricao;
          option.textContent = descricao;
          select.appendChild(option);
        });
    }
    
    // Restaurar valor
    if (valorAtual && valorAtual !== 'OUTROS') {
      const optionExists = Array.from(select.options).some(opt => opt.value === valorAtual);
      if (optionExists) select.value = valorAtual;
    }
  });
}

const tblBody = document.querySelector('#tblEquipamentos tbody');

// Adicionar linha
function addRow() {
  const tr = document.createElement('tr');
  
  // Equipamento
  const tdEquip = document.createElement('td');
  tdEquip.appendChild(criarSelectEquipamento());
  
  // Tipo
  const tdTipo = document.createElement('td');
  const { wrapper } = criarTipoManutencao();
  tdTipo.appendChild(wrapper);
  
  // Data
  const tdData = document.createElement('td');
  const inputData = document.createElement('input');
  inputData.type = 'date';
  inputData.style.width = '100%';
  const hoje = new Date();
  inputData.value = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}-${String(hoje.getDate()).padStart(2,'0')}`;
  tdData.appendChild(inputData);
  
  // Horímetro
  const tdHorimetro = document.createElement('td');
  const inputHorimetro = document.createElement('input');
  inputHorimetro.type = 'text';
  inputHorimetro.placeholder = 'Horímetro';
  inputHorimetro.style.width = '100%';
  tdHorimetro.appendChild(inputHorimetro);
  
  // Remover
  const tdRemove = document.createElement('td');
  const btnRemove = document.createElement('button');
  btnRemove.className = 'remove-row';
  btnRemove.textContent = '✕';
  btnRemove.onclick = () => {
    if (tblBody.children.length > 1) tr.remove();
    else alert('Mantenha pelo menos uma linha!');
  };
  tdRemove.appendChild(btnRemove);
  
  tr.append(tdEquip, tdTipo, tdData, tdHorimetro, tdRemove);
  tblBody.appendChild(tr);
  
  return tr;
}

// Obter valor do tipo
function getValorTipo(wrapper) {
  if (!wrapper) return '';
  
  const select = wrapper.querySelector('.tipo-select');
  const input = wrapper.querySelector('.tipo-input');
  
  if (input.classList.contains('mostrar') && input.value.trim()) {
    return input.value.trim();
  }
  
  if (select && select.value && select.value !== 'OUTROS') {
    return select.value;
  }
  
  return '';
}

// Obter dados
function getDadosFormulario() {
  const dataIso = $('rdm_data').value;
  const data = dataIso ? dataIso.split('-').reverse().join('/') : '';
  const horaDoc = $('rdm_hora_doc').value;

  return Array.from(tblBody.querySelectorAll('tr')).map(r => {
    const selectEquip = r.querySelector('td:first-child select');
    const inputs = r.querySelectorAll('td:nth-child(3) input[type="date"], td:nth-child(4) input[type="text"]');
    const tipoWrapper = r.querySelector('.tipo-wrapper');
    
    let dataManutencao = inputs[0] ? inputs[0].value : '';
    if (dataManutencao && dataManutencao.includes('-')) {
      const [ano, mes, dia] = dataManutencao.split('-');
      dataManutencao = `${dia}/${mes}/${ano}`;
    }
    
    return {
      data_documento: data,
      hora_documento: horaDoc,
      equipamento: selectEquip ? selectEquip.value : '',
      tipo_manutencao: getValorTipo(tipoWrapper),
      data_manutencao: dataManutencao,
      horimetro_atual: inputs[1] ? inputs[1].value : ''
    };
  }).filter(l => l.equipamento || l.tipo_manutencao || l.horimetro_atual);
}

// Event Listeners
window.addEventListener('DOMContentLoaded', () => {
  const now = new Date();
  $('rdm_data').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  $('rdm_hora_doc').value = now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  
  for (let i = 0; i < 10; i++) addRow();
  carregarTiposManutencao(false);
});

$('btnAdicionarLinha').onclick = () => addRow();

$('btnLimpar').onclick = () => {
  if (confirm('🧹 Limpar todos os lançamentos?')) {
    tblBody.innerHTML = '';
    for (let i = 0; i < 10; i++) addRow();
    setTimeout(atualizarTodosOsSelects, 100);
  }
};

// Enviar para servidor
async function enviarParaServidorRDM(mostrarAlerta = true) {
  const linhas = getDadosFormulario();
  if (linhas.length === 0) {
    if (mostrarAlerta) alert("⚠️ Não há dados!");
    return false;
  }

  try {
    const GET_URL = `https://api.jsonbin.io/v3/b/${BIN_RELATORIO}/latest`;
    const PUT_URL = `https://api.jsonbin.io/v3/b/${BIN_RELATORIO}`;
    
    const resGet = await fetch(GET_URL, { 
      headers: { 'X-Master-Key': MASTER_KEY, 'X-Bin-Meta': 'false' } 
    });
    
    let dadosExistentes = [];
    if(resGet.ok){
      const json = await resGet.json();
      if (json.record?.rdm_registros) dadosExistentes = json.record.rdm_registros;
      else if (json.rdm_registros) dadosExistentes = json.rdm_registros;
      else if (Array.isArray(json.record)) dadosExistentes = json.record;
      else if (Array.isArray(json)) dadosExistentes = json;
    }
    
    const resPut = await fetch(PUT_URL, {
      method:'PUT',
      headers:{
        'Content-Type':'application/json',
        'X-Master-Key':MASTER_KEY,
        'X-Bin-Versioning':'false'
      },
      body:JSON.stringify({ rdm_registros: [...dadosExistentes, ...linhas] })
    });

    if(resPut.ok) {
      localStorage.removeItem('rdm_offline_cache');
      return true;
    }
    return false;
  } catch(err){
    console.log('Erro:', err);
    return false;
  }
}

// Gerar PDF
$('btnGerarPDF').onclick = async () => {
  try {
    const { jsPDF } = window.jspdf;
    const [yyyy,mm,dd] = $('rdm_data').value.split('-');
    const dataFormatada = `${dd}/${mm}/${yyyy}`;
    $('meta_data').innerText = "DATA: " + dataFormatada;
    $('meta_hora_doc').innerText = "HORA: " + $('rdm_hora_doc').value;

    const tbody = $('rdm_equip_rows');
    tbody.innerHTML = "";
    
    let hasData = false;
    
    Array.from(tblBody.querySelectorAll('tr')).forEach(r => {
      const selectEquip = r.querySelector('td:first-child select');
      const tipoWrapper = r.querySelector('.tipo-wrapper');
      const inputs = r.querySelectorAll('td:nth-child(3) input[type="date"], td:nth-child(4) input[type="text"]');
      
      const equipValue = selectEquip ? selectEquip.value : '';
      const tipoValue = getValorTipo(tipoWrapper);
      const dataValue = inputs[0] ? inputs[0].value : '';
      const horimetroValue = inputs[1] ? inputs[1].value : '';
      
      if (equipValue || tipoValue || dataValue || horimetroValue) {
        hasData = true;
        let dataManutencaoFormatada = dataValue;
        if (dataManutencaoFormatada && dataManutencaoFormatada.includes('-')) {
          const [ano, mes, dia] = dataManutencaoFormatada.split('-');
          dataManutencaoFormatada = `${dia}/${mes}/${ano}`;
        }
        
        const tr2 = document.createElement('tr');
        tr2.innerHTML = `<td>${equipValue}</td><td>${tipoValue}</td><td>${dataManutencaoFormatada}</td><td>${horimetroValue}</td>`;
        tbody.appendChild(tr2);
      }
    });
    
    if (!hasData) {
      alert('⚠️ Não há dados!');
      return;
    }
    
    const wrapper = $('rdm_report').cloneNode(true);
    wrapper.style.visibility = 'visible';
    wrapper.style.position = 'absolute';
    wrapper.style.left = '-9999px';
    document.body.appendChild(wrapper);
  
    await new Promise(resolve => setTimeout(resolve, 500));
  
    const canvas = await html2canvas(wrapper, { scale: 1.5, backgroundColor: '#ffffff' });
    
    const pdf = new jsPDF({unit:'pt',format:'a4'});
    const img = canvas.toDataURL('image/png');
    const w = pdf.internal.pageSize.width - 40;
    const h = (canvas.height * w) / canvas.width;
    pdf.addImage(img, 'PNG', 20, 20, w, h);
    pdf.save(`RDM_${dataFormatada.replace(/\//g,'-')}.pdf`);
    document.body.removeChild(wrapper);
    
    alert('✅ PDF gerado!');
    
    if (await enviarParaServidorRDM(false)) {
      if (!confirm('✅ Enviado! Manter dados?')) $('btnLimpar').click();
    } else {
      alert('❌ Falha no envio. Salvando localmente.');
      salvarLocalmente();
    }
  } catch (error) {
    alert('❌ Erro ao gerar PDF');
  }
};

$('btnServidor').onclick = async () => {
  if (await enviarParaServidorRDM(true)) {
    if (confirm('✅ Enviado! Limpar?')) $('btnLimpar').click();
  } else {
    alert('❌ Falha no envio');
    salvarLocalmente();
  }
};

function salvarLocalmente() {
  const linhas = getDadosFormulario();
  if (linhas.length) {
    localStorage.setItem('rdm_offline_cache', JSON.stringify(linhas));
    alert('💾 Salvo localmente!');
  } else alert("⚠️ Não há dados!");
}

$('btnRecarregarTipos').onclick = () => carregarTiposManutencao(true);
$('btnSalvarLocal').onclick = salvarLocalmente;

// Carregar cache
window.addEventListener('load', () => {
  const cache = localStorage.getItem('rdm_offline_cache');
  if (cache) {
    try {
      const linhas = JSON.parse(cache);
      if (linhas.length && confirm('📦 Carregar dados salvos?')) {
        tblBody.innerHTML = '';
        linhas.forEach(dado => {
          const tr = addRow();
          const selectEquip = tr.querySelector('td:first-child select');
          const tipoWrapper = tr.querySelector('.tipo-wrapper');
          const inputs = tr.querySelectorAll('td:nth-child(3) input[type="date"], td:nth-child(4) input[type="text"]');
          
          if (selectEquip && dado.equipamento) selectEquip.value = dado.equipamento;
          
          if (inputs[0] && dado.data_manutencao) {
            if (dado.data_manutencao.includes('/')) {
              const [dia, mes, ano] = dado.data_manutencao.split('/');
              inputs[0].value = `${ano}-${mes}-${dia}`;
            }
          }
          
          if (inputs[1] && dado.horimetro_atual) inputs[1].value = dado.horimetro_atual;
          
          if (tipoWrapper && dado.tipo_manutencao) {
            const select = tipoWrapper.querySelector('.tipo-select');
            const input = tipoWrapper.querySelector('.tipo-input');
            
            const optionExists = Array.from(select.options).some(opt => opt.value === dado.tipo_manutencao);
            
            if (optionExists) {
              select.value = dado.tipo_manutencao;
            } else {
              select.value = 'OUTROS';
              select.classList.add('ocultar');
              input.classList.add('mostrar');
              input.value = dado.tipo_manutencao;
            }
          }
        });
        setTimeout(atualizarTodosOsSelects, 500);
      }
    } catch (e) {}
  }
});

// Online detector
window.addEventListener('online', async () => {
  const cache = localStorage.getItem('rdm_offline_cache');
  if (cache && confirm('🌐 Conexão restaurada! Enviar dados?')) {
    if (await enviarParaServidorRDM(false)) {
      localStorage.removeItem('rdm_offline_cache');
      alert('✅ Dados enviados!');
    }
  }
});

</script>
